name: Daily Scraper

on:
  schedule:
    # Run daily at 12:00 PM UTC (8:00 PM Singapore Time)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual triggers from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scraper.js

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add scrape.json scrape.md scrape.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scrape data - $(date '+%Y-%m-%d %H:%M UTC')" && git push)
